<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu Ứng Giọt Nước Cầu Vồng</title>
    <style>
        /* Cài đặt nền tối để làm nổi bật ánh sáng cầu vồng */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Nền gradient chuyển động để thấy rõ hiệu ứng bẻ cong ánh sáng */
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            overflow: hidden;
            font-family: sans-serif;
            perspective: 1000px;
            animation: bgShift 15s ease infinite;
        }

        @keyframes bgShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Thêm các họa tiết nền (lưới và đốm sáng) để tương tác với kính lỏng */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.15) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.15) 0%, transparent 20%),
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            z-index: -2;
        }

        /* Lớp bọc 1: Xử lý hiệu ứng di chuyển theo chuột */
        #cursor-tracker {
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        /* Lớp bọc 2: Xử lý hiệu ứng co giãn đàn hồi khi chạm vào */
        #click-bouncer {
            transition: transform 0.6s cubic-bezier(0.5, 2.5, 0.5, 1);
            will-change: transform;
            cursor: pointer;
        }

        /* Hình dáng chính của giọt nước */
        .water-drop {
            position: relative;
            width: 80vw;
            max-width: 320px;
            height: 80vw;
            max-height: 320px;
            /* Hiệu ứng kính lỏng, trong suốt, bẻ cong ánh sáng (refraction) */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            /* Đổ bóng khối 3D để tạo cảm giác kính trong vắt */
            box-shadow:
                inset 15px 15px 25px rgba(255, 255, 255, 0.4),
                /* Phản chiếu sáng mép trên */
                inset -15px -15px 35px rgba(255, 255, 255, 0.1),
                /* Phản chiếu nhẹ mép dưới */
                inset 25px -25px 50px rgba(0, 0, 0, 0.3),
                /* Đổ bóng cong bên trong */
                0 25px 45px rgba(0, 0, 0, 0.5);
            /* Bóng rơi xuống nền */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animation thay đổi hình dáng và trôi nổi nhẹ nhàng */
            animation:
                wobble 6s ease-in-out infinite,
                float 8s ease-in-out infinite;
        }

        /* Hiệu ứng thay đổi viền (tạo hình dáng chất lỏng wobbling) */
        @keyframes wobble {

            0%,
            100% {
                border-radius: 46% 54% 50% 50% / 48% 52% 48% 52%;
            }

            33% {
                border-radius: 54% 46% 48% 52% / 52% 48% 52% 48%;
            }

            66% {
                border-radius: 50% 50% 54% 46% / 48% 52% 46% 54%;
            }
        }

        /* Hiệu ứng bay bổng nhẹ nhàng lên xuống */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(3deg);
            }
        }

        /* Lõi ánh sáng giống Siri ở tâm giọt nước */
        .siri-core {
            position: absolute;
            width: 50%;
            height: 50%;
            /* Gradient với các màu đặc trưng của Siri: Tím, Hồng, Xanh lam, Xanh lơ */
            background: conic-gradient(from 0deg,
                    #ff2a85, #8a2be2, #4169e1, #00ffff, #ff2a85);
            border-radius: 50%;
            /* Làm mờ mạnh để tạo thành một khối sáng lan tỏa */
            filter: blur(25px);
            opacity: 0.95;
            mix-blend-mode: screen;
            /* Xoay và biến dạng liên tục */
            animation: spin 4s linear infinite, pulseCore 3s ease-in-out infinite alternate;
            z-index: -1;
        }

        /* Tâm sáng trắng bên trong lõi Siri */
        .siri-core::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 25%;
            right: 25%;
            bottom: 25%;
            background: #ffffff;
            border-radius: 50%;
            filter: blur(12px);
        }

        @keyframes pulseCore {
            0% {
                transform: scale(0.9);
                border-radius: 40% 60% 50% 50%;
            }

            100% {
                transform: scale(1.1);
                border-radius: 60% 40% 50% 50%;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Điểm phản quang chói sáng (mặt trước) */
        .reflection-main {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 15%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            transform: rotate(-45deg);
            pointer-events: none;
        }

        /* Điểm phản quang phụ (mặt dưới) */
        .reflection-sub {
            position: absolute;
            bottom: 12%;
            right: 18%;
            width: 15%;
            height: 8%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            transform: rotate(-45deg);
            pointer-events: none;
        }

        /* Hướng dẫn hiển thị trên màn hình */
        .hint-text {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
            animation: pulseHint 3s ease-in-out infinite;
        }

        @keyframes pulseHint {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>

    <div id="cursor-tracker">
        <div id="click-bouncer">
            <div class="water-drop">
                <!-- Ánh sáng Siri ở tâm -->
                <div class="siri-core"></div>
                <!-- Vùng bóng loáng để tạo cảm giác kính/nước 3D -->
                <div class="reflection-main"></div>
                <div class="reflection-sub"></div>
            </div>
        </div>
    </div>

    <div class="hint-text">Di chuột tới gần và chạm vào giọt nước</div>

    <script>
        const tracker = document.getElementById('cursor-tracker');
        const bouncer = document.getElementById('click-bouncer');

        // Hiệu ứng "dịch chuyển nhẹ nhàng" khi di chuột tới gần giọt nước
        document.addEventListener('mousemove', (e) => {
            // Tính toán khoảng cách từ chuột tới tâm màn hình
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;

            // Giọt nước sẽ nhẹ nhàng "né" hoặc trôi theo chuột
            tracker.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        });

        // Hiệu ứng nảy và rung rinh khi ai đó "chạm" (click/tap) vào
        const triggerTouchEffect = () => {
            // Bước 1: Giọt nước co lại một chút khi bị chạm mạnh
            bouncer.style.transform = 'scale(0.85)';
            bouncer.style.transition = 'transform 0.1s ease-out';

            // Bước 2: Nảy bật đàn hồi trở lại sau 100ms (giống thạch/chất lỏng)
            setTimeout(() => {
                bouncer.style.transform = 'scale(1)';
                bouncer.style.transition = 'transform 0.6s cubic-bezier(0.5, 2.5, 0.5, 1)';
            }, 100);
        };

        // Gắn sự kiện cho cả thiết bị chuột (PC) và cảm ứng (Mobile)
        bouncer.addEventListener('mousedown', triggerTouchEffect);
        bouncer.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Ngăn hành vi cuộn mặc định
            triggerTouchEffect();
        });
    </script>
</body>

</html>
