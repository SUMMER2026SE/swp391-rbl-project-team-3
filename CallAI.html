<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Intelligence - Ultimate Cinematic Invoke</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --ease-out: cubic-bezier(.16, 1, .3, 1);
            --ease-soft: cubic-bezier(.22, .86, .2, 1);

            --ai-cyan: 0, 245, 212;
            --ai-blue: 0, 122, 255;
            --ai-violet: 162, 0, 255;
            --ai-pink: 255, 45, 85;
            --ai-orange: 255, 149, 0;
            --white: 255, 255, 255;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 50% 18%, #1c1d26 0%, #0b0c11 42%, #030304 100%);
        }

        .stage {
            position: relative;
            width: min(92vw, 360px);
            aspect-ratio: 9 / 19.2;
            display: grid;
            place-items: center;
            perspective: 1200px;
        }

        .phone-shell {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 58px;
            background: linear-gradient(135deg, #1c1d24, #050506 42%, #23242d);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .12),
                inset 0 0 0 1px rgba(255, 255, 255, .04),
                0 48px 120px rgba(0, 0, 0, .85);
            isolation: isolate;
            transform: translateZ(0);
        }

        .side-button {
            position: absolute;
            right: -7px;
            top: 190px;
            width: 7px;
            height: 94px;
            border: 0;
            border-radius: 0 999px 999px 0;
            background: linear-gradient(180deg, #3b3c45, #111216 45%, #3d3e48);
            box-shadow: inset 1px 0 0 rgba(255, 255, 255, .20), 9px 16px 26px rgba(0, 0, 0, .34), 0 0 0 1px rgba(255, 255, 255, .06);
            cursor: pointer;
            z-index: 30;
            transition: transform 170ms var(--ease-out), filter 200ms var(--ease-out);
            transform: translateZ(0);
        }

        .side-button:active,
        .phone-shell.active .side-button {
            transform: translateX(-2px) scaleY(.965);
            filter: brightness(1.25);
        }

        .vol-up {
            position: absolute;
            left: -5px;
            top: 160px;
            width: 5px;
            height: 60px;
            background: #333;
            border-radius: 4px 0 0 4px;
        }

        .vol-down {
            position: absolute;
            left: -5px;
            top: 235px;
            width: 5px;
            height: 60px;
            background: #333;
            border-radius: 4px 0 0 4px;
        }

        .action-btn {
            position: absolute;
            left: -5px;
            top: 100px;
            width: 5px;
            height: 30px;
            background: #333;
            border-radius: 4px 0 0 4px;
        }

        .phone {
            position: absolute;
            inset: 6px;
            border-radius: 52px;
            overflow: hidden;
            background: #050507;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .055), inset 0 -30px 80px rgba(255, 255, 255, .02);
            transition: transform 620ms var(--ease-out), filter 620ms var(--ease-out), border-radius 620ms var(--ease-out);
            transform: translateZ(0);
        }

        .phone-shell.active .phone {
            transform: scale(.965);
            border-radius: 46px;
            filter: brightness(1.05) saturate(1.05);
        }

        /* Closing giúp tắt AI không bị giật ở frame cuối */
        .phone-shell.closing .phone {
            transform: scale(.985);
            border-radius: 49px;
            filter: brightness(1.025) saturate(1.025);
        }

        .screen {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            overflow: hidden;
            background: radial-gradient(circle at 50% -12%, rgba(255, 255, 255, .06), transparent 27%),
                linear-gradient(180deg, #121319 0%, #07080b 48%, #000 100%);
            transform: translateZ(0);
        }

        .ambient-field,
        .liquid-field {
            position: absolute;
            inset: -22%;
            pointer-events: none;
            z-index: 0;
            will-change: transform, opacity;
            /* Không transition opacity để tránh tụt màu sau khi mask lấp đầy */
            transition: opacity 0s, transform 900ms var(--ease-out);
            transform: translateZ(0);
            opacity: 0;
        }

        .ambient-field {
            filter: blur(74px) saturate(155%);
            background:
                radial-gradient(circle at 14% 18%, rgba(var(--ai-orange), .7), transparent 25%),
                radial-gradient(circle at 84% 16%, rgba(var(--ai-violet), .6), transparent 25%),
                radial-gradient(circle at 82% 78%, rgba(var(--ai-pink), .5), transparent 25%),
                radial-gradient(circle at 20% 84%, rgba(var(--ai-blue), .6), transparent 25%);
            animation: ambientMove 14s ease-in-out infinite alternate;
        }

        .liquid-field {
            mix-blend-mode: screen;
            filter: blur(44px) saturate(210%);
            background:
                radial-gradient(circle at 26% 28%, rgba(var(--ai-cyan), .3), transparent 25%),
                radial-gradient(circle at 74% 30%, rgba(var(--ai-violet), .2), transparent 25%),
                radial-gradient(circle at 72% 78%, rgba(var(--ai-pink), .2), transparent 25%);
            animation: liquidMove 9s ease-in-out infinite alternate;
        }

        /* Giữ cùng mức sáng cho active / revealing / closing để không bị sụt màu khi fill xong */
        .phone-shell.active .ambient-field,
        .phone-shell.revealing .ambient-field,
        .phone-shell.closing .ambient-field {
            opacity: .65;
        }

        .phone-shell.active .liquid-field,
        .phone-shell.revealing .liquid-field,
        .phone-shell.closing .liquid-field {
            opacity: .65;
        }

        @keyframes ambientMove {
            0% {
                transform: translate3d(-1.5%, -1%, 0) scale(1);
            }

            50% {
                transform: translate3d(2%, 2%, 0) scale(1.08);
            }

            100% {
                transform: translate3d(-2%, 1.5%, 0) scale(1.04);
            }
        }

        @keyframes liquidMove {
            0% {
                transform: translate3d(-2%, -1%, 0) scale(1);
            }

            50% {
                transform: translate3d(1.5%, 2.5%, 0) scale(1.06);
            }

            100% {
                transform: translate3d(-1%, 1%, 0) scale(1.03);
            }
        }

        .edge-system {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            z-index: 11;
            /* Không transition opacity, mask JS sẽ kiểm soát reveal */
            transition: opacity 0s;
            will-change: opacity;
            transform: translateZ(0);
        }

        .phone-shell.active .edge-system,
        .phone-shell.revealing .edge-system,
        .phone-shell.closing .edge-system {
            opacity: 1;
        }

        .edge-system::before,
        .edge-system::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 7px;
            background: conic-gradient(from var(--edge-angle),
                    rgba(var(--ai-orange), 0) 0deg,
                    rgba(var(--ai-orange), 1) 48deg,
                    rgba(var(--ai-pink), .96) 100deg,
                    rgba(var(--ai-violet), .96) 164deg,
                    rgba(var(--ai-blue), .68) 220deg,
                    rgba(var(--ai-cyan), .34) 292deg,
                    rgba(var(--ai-orange), 0) 360deg);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .edge-system::before {
            filter: blur(10px);
            opacity: 1;
            animation: edgeRotate 10s linear infinite;
        }

        .edge-system::after {
            filter: blur(24px);
            opacity: .5;
            animation: edgeRotateReverse 14s linear infinite;
        }

        @property --edge-angle {
            syntax: "<angle>";
            inherits: false;
            initial-value: 90deg;
        }

        @keyframes edgeRotate {
            from {
                --edge-angle: 90deg;
            }

            to {
                --edge-angle: 450deg;
            }
        }

        @keyframes edgeRotateReverse {
            from {
                --edge-angle: 450deg;
            }

            to {
                --edge-angle: 90deg;
            }
        }

        .power-origin {
            position: absolute;
            right: -22px;
            top: 126px;
            width: 124px;
            height: 196px;
            pointer-events: none;
            z-index: 12;
            opacity: 0;
            filter: blur(18px) saturate(170%);
            background: radial-gradient(ellipse at 100% 50%, rgba(255, 255, 255, .4), transparent 28%),
                radial-gradient(ellipse at 86% 50%, rgba(var(--ai-pink), .6), transparent 42%);
            transition: opacity 220ms var(--ease-out);
            will-change: transform, opacity;
        }

        .phone-shell.invoking .power-origin {
            opacity: 1;
            animation: powerFlash 820ms var(--ease-out) forwards;
        }

        @keyframes powerFlash {
            0% {
                transform: translate3d(20px, 0, 0) scale(.8);
                opacity: 0;
            }

            20% {
                opacity: .9;
            }

            100% {
                transform: translate3d(-22px, 0, 0) scale(1.3);
                opacity: 0;
            }
        }

        .content-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            transition: transform 680ms var(--ease-out), filter 680ms var(--ease-out), opacity 420ms var(--ease-out);
            transform: translateZ(0);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .phone-shell.active .content-layer {
            animation: contentFloat 9s ease-in-out infinite alternate;
        }

        .phone-shell.invoking .content-layer {
            animation: invokeSettle 820ms var(--ease-out) forwards;
        }

        .phone-shell.closing .content-layer {
            animation: none;
            transform: translate3d(0, 0, 0) scale(1);
            filter: brightness(1);
        }

        @keyframes invokeSettle {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                filter: brightness(1);
            }

            36% {
                transform: translate3d(-1.8px, 0, 0) scale(1.003);
                filter: brightness(1.05);
            }

            100% {
                transform: translate3d(0, 0, 0) scale(1);
                filter: brightness(1);
            }
        }

        @keyframes contentFloat {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(.4px, -.8px, 0) scale(1.0015);
            }

            100% {
                transform: translate3d(-.4px, .4px, 0) scale(1.001);
            }
        }

        #ui-clone {
            position: absolute;
            inset: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 7;
            opacity: 0;
            pointer-events: none;
            transform: scale(1.014) translateZ(0);
            filter: url(#glass-distort) brightness(1.34) saturate(1.16) contrast(1.03);
            will-change: mask-image, -webkit-mask-image, opacity;
            transition: none;
            mix-blend-mode: screen;
        }

        /* Không cho clone layer nhân đôi chữ/số lớn.
       Chữ thật sẽ được xử lý riêng theo từng ký tự bằng JS. */
        #ui-clone .status,
        #ui-clone .date-txt,
        #ui-clone .time-txt,
        #ui-clone .siri-text {
            opacity: 0 !important;
        }

        .status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, .7);
            font-size: 13px;
            font-weight: 650;
            z-index: 4;
        }

        .island {
            position: absolute;
            top: 15px;
            left: 50%;
            width: 110px;
            height: 32px;
            transform: translateX(-50%);
            background: #000;
            border-radius: 999px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .05);
        }

        .clock-widget {
            text-align: center;
            margin-top: 40px;
        }

        .date-txt {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
        }

        .time-txt {
            font-size: 80px;
            font-weight: 600;
            letter-spacing: -2.5px;
            line-height: 1;
            margin-top: 5px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .ui-element {
            will-change: transform, filter;
            transition: transform 340ms var(--ease-soft), filter 340ms var(--ease-out), opacity 340ms;
            transform-origin: center bottom;
            transform: translateZ(0);
        }

        .ui-element.wave-hit {
            transform: translateY(-4px) scale(1.012);
            filter: brightness(1.06) saturate(1.04);
        }

        .char {
            display: inline-block;
            white-space: pre;
            transform: translate3d(0, 0, 0) scale(1);
            will-change: transform, filter;
            transform-origin: center center;
        }

        .widgets-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .widget-box {
            aspect-ratio: 1;
            border-radius: 24px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
            position: relative;
            overflow: hidden;
        }

        .widget-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent 45%);
            opacity: .8;
        }

        .siri-orb-wrapper {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(15px) scale(0.98);
            transition: all 560ms var(--ease-out);
            z-index: 6;
            pointer-events: none;
        }

        .phone-shell.active .siri-orb-wrapper {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .siri-orb-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell.active .siri-orb-inner {
            animation: siriHover 7s ease-in-out infinite alternate;
        }

        @keyframes siriHover {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-4px);
            }
        }

        .siri-glowing-orb {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(var(--ai-pink), .5) 0%, rgba(var(--ai-blue), .3) 40%, transparent 70%);
            filter: blur(20px);
            mix-blend-mode: screen;
            animation: orbPulse 3s ease-in-out infinite alternate;
        }

        @keyframes orbPulse {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .siri-text {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-top: -30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .inner-edge {
            position: absolute;
            inset: 0;
            z-index: 13;
            pointer-events: none;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0s;
            box-shadow: inset -3px 0 28px rgba(var(--ai-cyan), .25), inset 0 0 40px rgba(var(--ai-violet), .2), inset 0 0 80px rgba(var(--ai-blue), .1);
        }

        .phone-shell.active .inner-edge,
        .phone-shell.revealing .inner-edge,
        .phone-shell.closing .inner-edge {
            opacity: 1;
        }

        .soft-vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 14;
            background: linear-gradient(90deg, rgba(0, 0, 0, .35), transparent 16%, transparent 84%, rgba(0, 0, 0, .35)), linear-gradient(180deg, rgba(0, 0, 0, .15), transparent 28%, transparent 72%, rgba(0, 0, 0, .35));
        }

        .wave-container {
            position: absolute;
            inset: 0;
            z-index: 18;
            pointer-events: none;
            border-radius: inherit;
            overflow: hidden;
        }

        .fullscreen-wave {
            position: absolute;
            inset: -10%;
            z-index: 16;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at var(--fx, 100%) var(--fy, 50%), rgba(255, 255, 255, .15), rgba(var(--ai-cyan), .12) 16%, rgba(var(--ai-blue), .1) 28%, rgba(var(--ai-violet), .08) 40%, transparent 62%);
            filter: blur(20px) saturate(160%);
            will-change: transform, opacity;
        }

        .fullscreen-wave.run {
            animation: fullscreenWave 1150ms var(--ease-out) forwards;
        }

        .fullscreen-wave.reverse-run {
            animation: fullscreenWaveReverse 980ms var(--ease-out) forwards;
        }

        @keyframes fullscreenWave {
            0% {
                opacity: 0;
                transform: scale(.2);
            }

            18% {
                opacity: .9;
            }

            100% {
                opacity: 0;
                transform: scale(2.4);
            }
        }

        @keyframes fullscreenWaveReverse {
            0% {
                opacity: .75;
                transform: scale(2.35);
            }

            78% {
                opacity: .8;
            }

            100% {
                opacity: 0;
                transform: scale(.18);
            }
        }

        .edge-sweep {
            position: absolute;
            right: -118px;
            top: var(--origin-y, 160px);
            width: 220px;
            height: 420px;
            margin-top: -210px;
            border-radius: 50%;
            opacity: 0;
            background: radial-gradient(circle, rgba(255, 255, 255, .35), rgba(var(--ai-pink), .25) 24%, rgba(var(--ai-violet), .18) 40%, transparent 72%);
            filter: blur(14px);
            animation: edgeSweep 1100ms var(--ease-out) forwards;
        }

        .edge-sweep.reverse {
            animation: edgeSweepReverse 980ms var(--ease-out) forwards;
        }

        @keyframes edgeSweep {
            0% {
                transform: translate3d(48px, 0, 0) scale(.24);
                opacity: 0;
            }

            16% {
                opacity: 1;
            }

            100% {
                transform: translate3d(-355px, 0, 0) scale(2.85);
                opacity: 0;
            }
        }

        @keyframes edgeSweepReverse {
            0% {
                transform: translate3d(-355px, 0, 0) scale(2.85);
                opacity: .72;
            }

            72% {
                opacity: .85;
            }

            100% {
                transform: translate3d(48px, 0, 0) scale(.22);
                opacity: 0;
            }
        }

        .optical-ring {
            position: absolute;
            width: 92px;
            height: 92px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(.1);
            background: radial-gradient(circle, transparent 38%, rgba(255, 255, 255, .2) 48%, rgba(var(--ai-cyan), .15) 56%, rgba(var(--ai-blue), .1) 62%, transparent 70%);
            backdrop-filter: brightness(1.3) saturate(1.1);
            -webkit-backdrop-filter: brightness(1.3) saturate(1.1);
            animation: ringExpand 1120ms var(--ease-out) forwards;
        }

        @keyframes ringExpand {
            0% {
                transform: translate(-50%, -50%) scale(.1);
                opacity: 1;
            }

            78% {
                opacity: .7;
            }

            100% {
                transform: translate(-50%, -50%) scale(22);
                opacity: 0;
            }
        }

        .touch-bloom {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 17;
            background: radial-gradient(circle, rgba(255, 255, 255, .7), rgba(var(--ai-pink), .3) 38%, transparent 70%);
            animation: touchBloom 900ms var(--ease-out) forwards;
        }

        @keyframes touchBloom {
            to {
                width: 720px;
                height: 720px;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="glass-distort">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="5" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <main class="stage">
        <section class="phone-shell" id="phoneShell" aria-label="Apple Intelligence Ultimate Invoke">
            <div class="action-btn"></div>
            <div class="vol-up"></div>
            <div class="vol-down"></div>
            <button class="side-button" id="powerButton" aria-label="Press power button to invoke AI"></button>

            <div class="phone">
                <div class="screen" id="screen">
                    <div class="ambient-field"></div>
                    <div class="liquid-field"></div>
                    <div class="power-origin"></div>
                    <div class="edge-system"></div>

                    <div class="content-layer" id="uiBase">
                        <div class="status">
                            <span>19:12</span>
                            <span>5G&nbsp;&nbsp;●&nbsp;&nbsp;82%</span>
                        </div>

                        <div class="island"></div>

                        <div class="clock-widget ui-element">
                            <div class="date-txt">Thứ Sáu, 14 Tháng 5</div>
                            <div class="time-txt">09:41</div>
                        </div>

                        <div class="widgets-row">
                            <div class="widget-box ui-element">
                                <div style="padding:15px">
                                    <svg width="24" height="24" fill="none" stroke="#FF9500" stroke-width="2">
                                        <path
                                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                                        </path>
                                    </svg>
                                    <div style="font-size:26px;font-weight:300;margin-top:10px">28°</div>
                                    <div style="font-size:12px;color:rgba(255,255,255,0.6)">Hà Nội</div>
                                </div>
                            </div>
                            <div class="widget-box ui-element">
                                <div style="padding:15px">
                                    <div
                                        style="width:100%;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:8px">
                                    </div>
                                    <div
                                        style="width:70%;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:20px">
                                    </div>
                                    <div
                                        style="width:85%;height:6px;background:rgba(0,122,255,0.6);border-radius:3px;margin-bottom:8px">
                                    </div>
                                    <div style="width:50%;height:6px;background:rgba(0,122,255,0.6);border-radius:3px">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="siri-orb-wrapper">
                            <div class="siri-orb-inner">
                                <div class="siri-glowing-orb"></div>
                                <div class="siri-text">Apple Intelligence...</div>
                            </div>
                        </div>
                    </div>

                    <div id="ui-clone"></div>
                    <div class="fullscreen-wave" id="fullscreenWave"></div>
                    <div class="wave-container" id="waveContainer"></div>
                    <div class="inner-edge"></div>
                    <div class="soft-vignette"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const shell = document.getElementById('phoneShell');
        const screen = document.getElementById('screen');
        const powerButton = document.getElementById('powerButton');
        const waveContainer = document.getElementById('waveContainer');
        const fullscreenWave = document.getElementById('fullscreenWave');
        const uiBase = document.getElementById('uiBase');
        const uiClone = document.getElementById('ui-clone');

        const edgeSystem = document.querySelector('.edge-system');
        const ambientField = document.querySelector('.ambient-field');
        const liquidField = document.querySelector('.liquid-field');
        const innerEdge = document.querySelector('.inner-edge');

        function splitTextIntoChars(selector) {
            document.querySelectorAll(selector).forEach((el) => {
                const text = el.textContent;
                el.textContent = '';
                [...text].forEach((ch) => {
                    const span = document.createElement('span');
                    span.className = 'char';
                    span.textContent = ch === ' ' ? ' ' : ch;
                    el.appendChild(span);
                });
            });
        }

        splitTextIntoChars('.date-txt, .time-txt, .siri-text');

        uiClone.innerHTML = uiBase.innerHTML;
        const baseElements = uiBase.querySelectorAll('.ui-element');
        const charElements = uiBase.querySelectorAll('.char');

        let active = false;
        let rafId = null;
        let invokeTimer = null;

        function pointFromPowerButton() {
            const screenRect = screen.getBoundingClientRect();
            const buttonRect = powerButton.getBoundingClientRect();
            return {
                x: screenRect.width - 2,
                y: buttonRect.top - screenRect.top + buttonRect.height / 2,
            };
        }

        function addTemporaryElement(className, x, y, reverse = false) {
            const el = document.createElement('div');
            el.className = reverse ? `${className} reverse` : className;
            if (Number.isFinite(x) && Number.isFinite(y)) {
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
            }
            if (className === 'edge-sweep' && Number.isFinite(y)) {
                el.style.setProperty('--origin-y', `${y}px`);
            }
            waveContainer.appendChild(el);
            el.addEventListener('animationend', () => el.remove(), { once: true });
            return el;
        }

        function runFullscreenWave(x, y, reverse = false) {
            fullscreenWave.style.setProperty('--fx', `${x}px`);
            fullscreenWave.style.setProperty('--fy', `${y}px`);
            fullscreenWave.classList.remove('run', 'reverse-run');
            void fullscreenWave.offsetWidth;
            fullscreenWave.classList.add(reverse ? 'reverse-run' : 'run');
        }

        function applyInlineMask(radius, x, y) {
            const maskCSS = `radial-gradient(circle at ${x}px ${y}px, #000 0px, #000 ${radius}px, transparent ${radius + 52}px)`;
            edgeSystem.style.webkitMaskImage = maskCSS;
            edgeSystem.style.maskImage = maskCSS;
            ambientField.style.webkitMaskImage = maskCSS;
            ambientField.style.maskImage = maskCSS;
            liquidField.style.webkitMaskImage = maskCSS;
            liquidField.style.maskImage = maskCSS;
            innerEdge.style.webkitMaskImage = maskCSS;
            innerEdge.style.maskImage = maskCSS;
        }

        function removeInlineMask() {
            edgeSystem.style.webkitMaskImage = 'none';
            edgeSystem.style.maskImage = 'none';
            ambientField.style.webkitMaskImage = 'none';
            ambientField.style.maskImage = 'none';
            liquidField.style.webkitMaskImage = 'none';
            liquidField.style.maskImage = 'none';
            innerEdge.style.webkitMaskImage = 'none';
            innerEdge.style.maskImage = 'none';
        }

        function runProgressiveReveal(x, y, reverse = false) {
            const rect = screen.getBoundingClientRect();
            const maxRadius = Math.hypot(rect.width, rect.height) + 250;
            const duration = reverse ? 880 : 980;
            let start = null;

            shell.classList.add('revealing');
            if (reverse) shell.classList.add('closing');

            function animate(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const radius = reverse ? maxRadius * (1 - eased) : eased * maxRadius;

                applyInlineMask(radius, x, y);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    shell.classList.remove('revealing');

                    if (!reverse) {
                        // Lấp đầy xong: gỡ mask nhưng opacity giữ nguyên .65 / 1,
                        // nên màu không bị giảm sau khi viền full.
                        removeInlineMask();
                    } else {
                        shell.classList.remove('closing');
                        removeInlineMask();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function runRefractionMask(x, y) {
            if (rafId) cancelAnimationFrame(rafId);

            uiClone.style.transformOrigin = `${x}px ${y}px`;
            uiClone.style.opacity = '1';

            const rect = screen.getBoundingClientRect();
            const maxRadius = Math.hypot(rect.width, rect.height) + 140;

            let start = null;
            const duration = 980;

            function animate(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);

                const currentRadius = easeOut * maxRadius;
                const thickness = 25 + progress * 40;

                const r1 = Math.max(0, currentRadius - thickness);
                const r2 = Math.max(0, currentRadius - thickness * .42);
                const r3 = currentRadius;
                const r4 = currentRadius + 8;

                const mask = `radial-gradient(circle at ${x}px ${y}px, transparent ${r1}px, black ${r2}px, black ${r3}px, transparent ${r4}px)`;
                uiClone.style.webkitMaskImage = mask;
                uiClone.style.maskImage = mask;

                if (progress < 1) {
                    rafId = requestAnimationFrame(animate);
                } else {
                    uiClone.style.opacity = '0';
                    setTimeout(() => {
                        uiClone.style.webkitMaskImage = 'none';
                        uiClone.style.maskImage = 'none';
                    }, 0);
                    rafId = null;
                }
            }
            rafId = requestAnimationFrame(animate);
        }

        function runPhysicsMotion(x, y) {
            const screenRect = screen.getBoundingClientRect();
            const shockSpeed = 1.05;

            baseElements.forEach((el) => {
                const rect = el.getBoundingClientRect();
                const elX = rect.left - screenRect.left + rect.width / 2;
                const elY = rect.top - screenRect.top + rect.height / 2;
                const dist = Math.hypot(elX - x, elY - y);
                const delay = Math.min(dist / shockSpeed, 520);

                window.setTimeout(() => {
                    el.classList.add('wave-hit');
                    window.setTimeout(() => el.classList.remove('wave-hit'), 240);
                }, delay);
            });

            // Chữ/số chuyển động theo từng ký tự, tỉ lệ dựa trên font-size + khoảng cách.
            // Điều này tránh cảm giác cả cụm chữ bị nhân bản hoặc mọi ký tự đi cùng một khoảng.
            charElements.forEach((ch) => {
                const rect = ch.getBoundingClientRect();
                const chX = rect.left - screenRect.left + rect.width / 2;
                const chY = rect.top - screenRect.top + rect.height / 2;
                const dist = Math.hypot(chX - x, chY - y);
                const delay = Math.min(dist / 1.18, 540);

                const fontSize = parseFloat(getComputedStyle(ch).fontSize) || 16;
                const sizeFactor = Math.min(1.8, Math.max(.55, fontSize / 42));
                const distanceFactor = Math.max(.18, 1 - dist / 760);
                const widthFactor = Math.min(1.25, Math.max(.72, rect.width / Math.max(fontSize * .55, 1)));
                const amplitude = 3.2 * sizeFactor * distanceFactor * widthFactor;

                const dx = chX - x;
                const dy = chY - y;
                const len = Math.max(Math.hypot(dx, dy), 1);
                const nx = dx / len;
                const ny = dy / len;

                window.setTimeout(() => {
                    ch.getAnimations().forEach((a) => a.cancel());
                    const anim = ch.animate([
                        { transform: 'translate3d(0px,0px,0) scale(1)', filter: 'brightness(1)' },
                        { transform: `translate3d(${nx * amplitude}px, ${ny * amplitude - amplitude * .35}px, 0) scale(${1 + .006 * sizeFactor})`, filter: 'brightness(1.08)', offset: .34 },
                        { transform: `translate3d(${-nx * amplitude * .18}px, ${-ny * amplitude * .14}px, 0) scale(${1 - .002 * sizeFactor})`, filter: 'brightness(1.025)', offset: .68 },
                        { transform: 'translate3d(0px,0px,0) scale(1)', filter: 'brightness(1)' }
                    ], {
                        duration: 560,
                        easing: 'cubic-bezier(.16, 1, .3, 1)',
                        fill: 'none'
                    });
                    anim.onfinish = () => {
                        ch.style.transform = 'translate3d(0px,0px,0) scale(1)';
                        ch.style.filter = 'brightness(1)';
                    };
                }, delay);
            });
        }

        function invokeFromPowerButton(turningOff = false) {
            const { x, y } = pointFromPowerButton();

            if (invokeTimer) clearTimeout(invokeTimer);
            shell.classList.remove('invoking');
            void shell.offsetWidth;
            shell.classList.add('invoking');
            invokeTimer = window.setTimeout(() => shell.classList.remove('invoking'), 1000);

            addTemporaryElement('touch-bloom', x, y);
            addTemporaryElement('edge-sweep', x, y, turningOff);
            addTemporaryElement('optical-ring', x, y);
            runFullscreenWave(x, y, turningOff);

            runProgressiveReveal(x, y, turningOff);

            runRefractionMask(x, y);
            runPhysicsMotion(x, y);

            if (navigator.vibrate) navigator.vibrate(20);
        }

        powerButton.addEventListener('pointerdown', () => {
            if (!active) {
                active = true;
                shell.classList.remove('closing');
                shell.classList.add('active');
                invokeFromPowerButton(false);
            } else {
                active = false;
                // Tắt active ngay để un-squeeze đồng bộ với hiệu ứng thu ngược,
                // closing giữ opacity ánh sáng đến khi mask thu hết.
                shell.classList.remove('active');
                shell.classList.add('closing');
                invokeFromPowerButton(true);
            }
        });
    </script>
</body>

</html>
